# =============================================================
# Docker-окружение для тестирования модуля adm.asyncfiles
#
# Запуск:  docker compose up -d --build
# Остановка: docker compose down
# URL:     http://localhost:8080/bitrixsetup.php (первый запуск)
# =============================================================

services:
  # ---------- Nginx ----------
  nginx:
    image: nginx:1.25-alpine
    container_name: bx-asyncfiles-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/www:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Модуль монтируется автоматически в Битрикс
      - .:/var/www/html/local/modules/adm.asyncfiles
    depends_on:
      - php
    restart: unless-stopped

  # ---------- PHP 8.2 FPM ----------
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: bx-asyncfiles-php
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=bitrix
      - RABBITMQ_PASSWORD=bitrix
      - RABBITMQ_QUEUE=file_processing_queue
    volumes:
      - ./docker/www:/var/www/html
      - .:/var/www/html/local/modules/adm.asyncfiles
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ---------- MySQL 8.0 ----------
  mysql:
    image: mysql:8.0
    container_name: bx-asyncfiles-mysql
    environment:
      MYSQL_ROOT_PASSWORD: bitrix
      MYSQL_DATABASE: bitrix
      MYSQL_USER: bitrix
      MYSQL_PASSWORD: bitrix
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/bitrix.cnf:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ubitrix", "-pbitrix"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------- RabbitMQ ----------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bx-asyncfiles-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: bitrix
      RABBITMQ_DEFAULT_PASS: bitrix
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Worker (обработчик очереди) ----------
  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: bx-asyncfiles-worker
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=bitrix
      - RABBITMQ_PASSWORD=bitrix
      - RABBITMQ_QUEUE=file_processing_queue
    volumes:
      - ./docker/www:/var/www/html
      - .:/var/www/html/local/modules/adm.asyncfiles
    command: ["php", "/var/www/html/local/modules/adm.asyncfiles/bin/worker.php"]
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  rabbitmq_data:

